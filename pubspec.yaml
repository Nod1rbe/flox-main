name: flox
description: "Flox: no code funnel builder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # auth methods
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

  # ui packages
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0
  percent_indicator: ^4.2.5
  elegant_notification: ^2.4.4
  fl_chart: ^0.71.0
  web: ^1.1.1
  dropdown_button2: ^2.3.9
  image_picker: ^1.1.2
  emoji_picker_flutter: ^4.3.0
  another_flushbar: ^1.12.30

  # backend
  firebase_core: ^3.13.1
  supabase_flutter: ^2.8.4

  # dart core
  get_it: ^8.0.3
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  auto_route: ^10.0.1
  flutter_bloc: ^9.1.0
  dartz: ^0.10.1
  url_launcher: ^6.3.1
  flutter_image_compress: ^2.4.0
  equatable: ^2.0.7
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  google_fonts: ^8.0.2
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.10.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  auto_route_generator: ^10.0.1


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/img/

flutter_gen:
  output: lib/core/gen
  integrations:
    flutter_svg: true